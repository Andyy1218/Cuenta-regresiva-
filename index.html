<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andyy & Nicoll — Nuestro Encuentro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8405a;
    --rose-light: #f7c5ce;
    --rose-pale: #fce8ec;
    --cream: #fff9f9;
    --text: #4a1a25;
    --muted: #9e6070;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fce8ec 0%, #ffd6df 40%, #fce4ef 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    padding: 20px;
    gap: 24px;
  }

  /* ─── STARS CANVAS ───────────────────────────────────── */
  #stars-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(232,64,90,0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(232,64,90,0.07) 0%, transparent 40%),
      radial-gradient(circle at 50% 10%, rgba(255,255,255,0.4) 0%, transparent 30%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── MUSIC BUTTON ───────────────────────────────────── */
  #music-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 100;
    background: rgba(255,255,255,0.88);
    border: 1.5px solid rgba(232,64,90,0.25);
    border-radius: 50px;
    padding: 9px 18px;
    font-size: 13px;
    font-family: 'Lato', sans-serif;
    color: var(--rose);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(10px);
    box-shadow: 0 2px 16px rgba(232,64,90,0.15);
    transition: all 0.2s ease;
  }
  #music-btn:hover { transform: scale(1.05); }

  .note {
    font-size: 16px;
    display: inline-block;
    animation: pulse-note 1.8s ease-in-out infinite;
  }
  .muted .note { opacity: 0.4; animation: none; }

  @keyframes pulse-note {
    0%,100% { transform: scale(1) rotate(-5deg); }
    50%      { transform: scale(1.2) rotate(5deg); }
  }

  #yt-frame { display: none; }

  /* ─── CARDS ──────────────────────────────────────────── */
  .card, .map-card {
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    max-width: 600px;
    width: 100%;
    box-shadow:
      0 8px 60px rgba(232,64,90,0.15),
      0 2px 12px rgba(232,64,90,0.08),
      inset 0 1px 0 rgba(255,255,255,0.9);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .card     { padding: 48px 52px 44px; }
  .map-card { padding: 32px 40px 28px; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 30px);
    color: var(--rose);
    line-height: 1.25;
    letter-spacing: -0.3px;
    margin-bottom: 36px;
  }

  /* ─── JOURNEY ────────────────────────────────────────── */
  .journey {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
    padding: 0 8px;
  }

  .person {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 2;
  }

  .photo-ring {
    width: 78px; height: 78px;
    border-radius: 50%;
    border: 3px solid var(--rose);
    padding: 3px;
    background: white;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(232,64,90,0.2);
  }
  .photo-ring img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

  .photo-placeholder {
    width:100%; height:100%;
    border-radius:50%;
    background: linear-gradient(135deg, var(--rose-pale), var(--rose-light));
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
  }

  .flag {
    width:32px; height:22px;
    border-radius:3px; object-fit:cover;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .person-label {
    font-size:12px; font-weight:700;
    color: var(--rose); letter-spacing:0.5px;
  }

  .path-track {
    position:absolute; top:38px;
    left:80px; right:80px; height:60px;
    pointer-events:none;
  }
  .path-track svg { width:100%; height:100%; overflow:visible; }

  #flight-path {
    fill:none; stroke:var(--rose);
    stroke-width:2; stroke-dasharray:7 5; opacity:0.55;
  }

  .plane-wrapper {
    position:absolute; top:38px;
    left:80px; right:80px; height:60px;
    pointer-events:none;
  }

  #plane {
    position:absolute; font-size:22px;
    transform:translate(-50%,-50%);
    filter: drop-shadow(0 2px 6px rgba(232,64,90,0.3));
  }

  /* ─── COUNTDOWN ──────────────────────────────────────── */
  .countdown-box {
    background: linear-gradient(135deg,#fff5f7,#ffeef2);
    border: 1.5px solid rgba(232,64,90,0.15);
    border-radius:20px;
    padding:28px 20px 22px;
    margin-bottom:28px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 2px 16px rgba(232,64,90,0.06);
  }

  .countdown-grid {
    display:flex; justify-content:center;
    gap:8px; align-items:flex-start;
  }

  .time-block { display:flex; flex-direction:column; align-items:center; min-width:72px; }

  .time-number {
    font-family:'Playfair Display',serif;
    font-size:clamp(42px,10vw,62px);
    font-weight:700; color:var(--rose);
    line-height:1; letter-spacing:-1px;
  }

  .time-label {
    font-size:12px; color:var(--muted);
    font-weight:400; letter-spacing:1px;
    text-transform:lowercase; margin-top:4px;
  }

  .time-sep {
    font-family:'Playfair Display',serif;
    font-size:50px; color:var(--rose-light);
    line-height:1; padding-top:2px;
    font-weight:300; align-self:flex-start;
  }

  .progress-wrap {
    margin-top:18px; height:4px;
    background:rgba(232,64,90,0.12);
    border-radius:99px; overflow:hidden;
  }
  #progress-bar {
    height:100%;
    background:linear-gradient(90deg,var(--rose-light),var(--rose));
    border-radius:99px; transition:width 1s linear;
  }
  .progress-labels {
    display:flex; justify-content:space-between;
    margin-top:6px; font-size:10px;
    color:var(--muted); letter-spacing:0.2px;
  }

  .phrase {
    font-family:'Playfair Display',serif;
    font-style:italic; font-size:15px;
    color:var(--muted); line-height:1.6;
    margin-bottom:20px; padding:0 12px;
  }
  .phrase::before { content:'"'; }
  .phrase::after  { content:'"'; }

  .heart {
    font-size:26px;
    animation:heartbeat 1.4s ease-in-out infinite;
    display:inline-block;
  }
  @keyframes heartbeat {
    0%,100% { transform:scale(1); }
    15%     { transform:scale(1.22); }
    30%     { transform:scale(1); }
    45%     { transform:scale(1.14); }
  }

  /* ─── MAP ────────────────────────────────────────────── */
  .map-card h2 {
    font-family:'Playfair Display',serif;
    font-size:16px; color:var(--rose);
    margin-bottom:16px; letter-spacing:0.3px;
  }

  #map-svg {
    width:100%; max-height:240px;
    border-radius:16px; overflow:hidden; display:block;
  }

  .map-cities {
    display:flex; justify-content:space-between;
    margin-top:10px; font-size:11px;
    color:var(--muted); padding:0 4px;
  }
  .map-cities b { color:var(--rose); }

  /* ─── RESPONSIVE ─────────────────────────────────────── */
  @media (max-width:480px) {
    .card  { padding:28px 20px; }
    .map-card { padding:24px 16px; }
    .photo-ring { width:64px; height:64px; }
    .path-track,.plane-wrapper { left:68px; right:68px; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<iframe id="yt-frame" width="1" height="1" src="" allow="autoplay" frameborder="0"></iframe>

<button id="music-btn" class="muted" onclick="toggleMusic()">
  <span class="note">♪</span>
  <span id="music-label">Nuestra canción</span>
</button>

<!-- Main card -->
<div class="card">
  <h1>Cuenta Regresiva a<br>Nuestro Encuentro</h1>

  <div class="journey">
    <div class="person">
      <div class="photo-ring"><div class="photo-placeholder">👨</div></div>
      <img class="flag" src="https://flagcdn.com/w80/co.png" alt="Colombia">
      <span class="person-label">Andyy</span>
    </div>

    <div class="path-track">
      <svg viewBox="0 0 300 60" preserveAspectRatio="none">
        <path id="flight-path" d="M 0,50 Q 150,-10 300,50"/>
      </svg>
    </div>
    <div class="plane-wrapper" id="plane-container">
      <span id="plane">✈️</span>
    </div>

    <div class="person">
      <div class="photo-ring"><div class="photo-placeholder">👩</div></div>
      <img class="flag" src="https://flagcdn.com/w80/es.png" alt="España">
      <span class="person-label">Nicoll</span>
    </div>
  </div>

  <div class="countdown-box">
    <div class="countdown-grid">
      <div class="time-block"><div class="time-number" id="days">---</div><div class="time-label">días</div></div>
      <div class="time-sep">·</div>
      <div class="time-block"><div class="time-number" id="hours">--</div><div class="time-label">horas</div></div>
      <div class="time-sep">·</div>
      <div class="time-block"><div class="time-number" id="minutes">--</div><div class="time-label">minutos</div></div>
      <div class="time-sep">·</div>
      <div class="time-block"><div class="time-number" id="seconds">--</div><div class="time-label">segundos</div></div>
    </div>
    <div class="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <div class="progress-labels">
      <span>12 Feb 2026</span>
      <span id="pct-label">0% del camino</span>
      <span>25 Jul 2026</span>
    </div>
  </div>

  <p class="phrase">Cada día un suspiro menos para nuestro abrazo.</p>
  <div class="heart">❤️</div>
</div>

<!-- Map card -->
<div class="map-card">
  <h2>✈️ Barranquilla → Madrid</h2>
  <svg id="map-svg" viewBox="0 0 520 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="520" height="240" fill="#fce8ec" rx="16"/>

    <!-- North America -->
    <path d="M 30,20 L 80,18 L 95,30 L 100,50 L 90,70 L 85,90 L 75,100 L 70,120 L 60,130 L 50,125 L 40,110 L 35,90 L 30,70 L 25,50 Z" fill="#f9d0d8" stroke="#f0a0b0" stroke-width="0.8"/>
    <!-- Central America -->
    <path d="M 75,120 L 85,125 L 82,135 L 78,138 L 74,133 L 72,127 Z" fill="#f9d0d8" stroke="#f0a0b0" stroke-width="0.8"/>
    <!-- South America -->
    <path d="M 80,140 L 100,138 L 118,145 L 125,160 L 128,180 L 122,205 L 110,220 L 95,225 L 80,218 L 70,200 L 65,180 L 68,160 L 72,148 Z" fill="#f9d0d8" stroke="#f0a0b0" stroke-width="0.8"/>
    <!-- Colombia highlight -->
    <path d="M 82,148 L 97,145 L 105,155 L 100,165 L 88,163 L 80,156 Z" fill="#e8405a" opacity="0.35"/>

    <!-- Europe -->
    <path d="M 285,25 L 310,20 L 335,25 L 345,40 L 340,55 L 325,58 L 310,60 L 295,55 L 285,45 Z" fill="#f9d0d8" stroke="#f0a0b0" stroke-width="0.8"/>
    <!-- Spain highlight -->
    <path d="M 285,45 L 300,42 L 312,48 L 310,62 L 295,65 L 283,58 Z" fill="#e8405a" opacity="0.35"/>
    <!-- UK -->
    <path d="M 295,22 L 305,18 L 308,28 L 300,32 L 293,28 Z" fill="#f9d0d8" stroke="#f0a0b0" stroke-width="0.8"/>
    <!-- Africa partial -->
    <path d="M 295,75 L 330,70 L 355,80 L 360,110 L 350,145 L 330,165 L 310,168 L 292,155 L 283,130 L 282,105 L 288,85 Z" fill="#f9d0d8" stroke="#f0a0b0" stroke-width="0.8"/>

    <text x="195" y="125" font-family="'Lato',sans-serif" font-size="9" fill="#e8405a" opacity="0.4" text-anchor="middle" font-style="italic">Océano Atlántico</text>

    <!-- Flight arc -->
    <path d="M 92,156 Q 190,30 300,53" fill="none" stroke="#e8405a" stroke-width="1.8" stroke-dasharray="6 4" opacity="0.6"/>

    <!-- Barranquilla pulse -->
    <circle cx="92" cy="156" r="5" fill="#e8405a" opacity="0.9"/>
    <circle cx="92" cy="156" r="5" fill="#e8405a" opacity="0.25">
      <animate attributeName="r" values="5;14;5" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="92" y="174" font-family="'Playfair Display',serif" font-size="8" fill="#e8405a" text-anchor="middle" font-weight="bold">Barranquilla</text>

    <!-- Madrid pulse -->
    <circle cx="300" cy="53" r="5" fill="#e8405a" opacity="0.9"/>
    <circle cx="300" cy="53" r="5" fill="#e8405a" opacity="0.25">
      <animate attributeName="r" values="5;14;5" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <text x="300" y="42" font-family="'Playfair Display',serif" font-size="8" fill="#e8405a" text-anchor="middle" font-weight="bold">Madrid</text>

    <!-- Plane on map -->
    <text id="map-plane" font-size="13" text-anchor="middle" dominant-baseline="middle">✈️</text>
  </svg>
  <div class="map-cities">
    <b>🇨🇴 Barranquilla, Colombia</b>
    <b>🇪🇸 Madrid, España</b>
  </div>
</div>

<script>
  // ── STARS ──────────────────────────────────────────────────
  const canvas = document.getElementById('stars-canvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function initStars() {
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.6 + 0.3,
        alpha: Math.random() * 0.45 + 0.08,
        speed: Math.random() * 0.007 + 0.003,
        offset: Math.random() * Math.PI * 2
      });
    }
  }
  function drawStars(ts) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const a = s.alpha * (0.4 + 0.6 * Math.sin(ts * s.speed + s.offset));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,64,90,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resizeCanvas(); initStars(); requestAnimationFrame(drawStars);
  window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

  // ── MUSIC ──────────────────────────────────────────────────
  const ytFrame    = document.getElementById('yt-frame');
  const musicBtn   = document.getElementById('music-btn');
  const musicLabel = document.getElementById('music-label');
  let playing = false;
  const YT_ID = '6NXnxTNIWkc';

  function toggleMusic() {
    if (!playing) {
      ytFrame.src = `https://www.youtube.com/embed/${YT_ID}?autoplay=1&loop=1&playlist=${YT_ID}&controls=0`;
      musicBtn.classList.remove('muted');
      musicLabel.textContent = 'Pausar ♫';
      playing = true;
    } else {
      ytFrame.src = '';
      musicBtn.classList.add('muted');
      musicLabel.textContent = 'Nuestra canción';
      playing = false;
    }
  }

  // ── DATES ──────────────────────────────────────────────────
  const START    = new Date('2026-02-12T00:00:00');
  const TARGET   = new Date('2026-07-25T00:00:00');
  const TOTAL_MS = TARGET - START;

  // ── BEZIER ─────────────────────────────────────────────────
  function bz(t, p0, p1, p2) {
    const i = 1 - t;
    return i*i*p0 + 2*i*t*p1 + t*t*p2;
  }
  // Card plane: M 0,50 Q 150,-10 300,50
  function cardPos(t)  { return { x: bz(t, 0, 150, 300), y: bz(t, 50, -10, 50) }; }
  // Map plane:  M 92,156 Q 190,30 300,53
  function mapPos(t)   { return { x: bz(t, 92, 190, 300), y: bz(t, 156, 30, 53) }; }

  // DOM
  const plane       = document.getElementById('plane');
  const container   = document.getElementById('plane-container');
  const mapPlane    = document.getElementById('map-plane');
  const dDays       = document.getElementById('days');
  const dHours      = document.getElementById('hours');
  const dMinutes    = document.getElementById('minutes');
  const dSeconds    = document.getElementById('seconds');
  const progressBar = document.getElementById('progress-bar');
  const pctLabel    = document.getElementById('pct-label');

  function updateCardPlane(p) {
    const W = container.offsetWidth, H = container.offsetHeight;
    const {x, y} = cardPos(p);
    const px = (x/300)*W, py = (y/60)*H;
    const t2 = Math.min(p+0.01,1);
    const {x:x2,y:y2} = cardPos(t2);
    const angle = Math.atan2((y2-y)/60,(x2-x)/300)*(180/Math.PI);
    plane.style.left      = px+'px';
    plane.style.top       = py+'px';
    plane.style.transform = `translate(-50%,-50%) rotate(${angle}deg)`;
  }

  function updateMapPlane(p) {
    const {x, y} = mapPos(p);
    const t2 = Math.min(p+0.01,1);
    const {x:x2,y:y2} = mapPos(t2);
    const angle = Math.atan2(y2-y, x2-x)*(180/Math.PI);
    mapPlane.setAttribute('x', x);
    mapPlane.setAttribute('y', y);
    mapPlane.setAttribute('transform', `rotate(${angle},${x},${y})`);
  }

  function tick() {
    const now = new Date();
    const rem = TARGET - now;
    if (rem <= 0) {
      dDays.textContent='0'; dHours.textContent='00';
      dMinutes.textContent='00'; dSeconds.textContent='00';
      updateCardPlane(1); updateMapPlane(1);
      progressBar.style.width='100%';
      pctLabel.textContent='¡Llegó el día! 🎉';
      return;
    }
    const ts  = Math.floor(rem/1000);
    const s   = ts%60, tm=Math.floor(ts/60), m=tm%60;
    const th  = Math.floor(tm/60), h=th%24, d=Math.floor(th/24);
    dDays.textContent    = d;
    dHours.textContent   = String(h).padStart(2,'0');
    dMinutes.textContent = String(m).padStart(2,'0');
    dSeconds.textContent = String(s).padStart(2,'0');

    const p = Math.max(0,Math.min(1,(now-START)/TOTAL_MS));
    progressBar.style.width = (p*100).toFixed(2)+'%';
    pctLabel.textContent    = (p*100).toFixed(1)+'% del camino';
    updateCardPlane(p);
    updateMapPlane(p);
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
